name: Supabase Migrations

on:
  push:
    branches:
      - main
    paths:
      - "supabase/migrations/**"
  workflow_dispatch:

concurrency:
  group: supabase-migrations-main
  cancel-in-progress: false

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required Supabase secrets
        run: |
          missing=()

          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            missing+=("SUPABASE_ACCESS_TOKEN")
          fi
          if [ -z "${SUPABASE_PROJECT_REF:-}" ]; then
            missing+=("SUPABASE_PROJECT_REF")
          fi
          if [ -z "${SUPABASE_DB_PASSWORD:-}" ]; then
            missing+=("SUPABASE_DB_PASSWORD")
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required GitHub secret(s): %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Apply migrations to Supabase
        run: supabase db push --include-all

      - name: Validate remote migration history matches repository
        run: bash scripts/validate-supabase-migrations.sh
